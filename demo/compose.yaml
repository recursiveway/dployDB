services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${DPLOYDB_DEMO_UID:?DPLOYDB_DEMO_UID is required}:${DPLOYDB_DEMO_GID:?DPLOYDB_DEMO_GID is required}"
    environment:
      DATABASE_PATH: /data/app.db
      RELEASE_DIRECTORY: /releases/${DPLOYDB_VERSION:?DPLOYDB_VERSION is required}
      PORT: "8080"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - type: bind
        source: ${DPLOYDB_DEMO_DATA_DIR:?DPLOYDB_DEMO_DATA_DIR is required}
        target: /data
        read_only: false
      - type: bind
        source: ${DPLOYDB_DEMO_RELEASE_DIR:?DPLOYDB_DEMO_RELEASE_DIR is required}
        target: /releases/${DPLOYDB_VERSION:?DPLOYDB_VERSION is required}
        read_only: true
    ports:
      - "127.0.0.1:${DPLOYDB_DEMO_PORT:?DPLOYDB_DEMO_PORT is required}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    init: true
    restart: "no"
    stop_grace_period: 10s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, urllib.request;
          response = urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2);
          assert response.status == 200 and json.load(response).get('ok') is True
      interval: 1s
      timeout: 3s
      retries: 10
      start_period: 1s
