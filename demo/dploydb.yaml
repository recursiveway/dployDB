# Future-facing DployDB configuration example.
# Milestone 0 does not load or validate this file.
project: dploydb-demo

state_directory: /srv/dploydb-demo/.dploydb

database:
  path: /srv/dploydb-demo/demo/.state/default/data/app.db
  path_env: DATABASE_PATH
  minimum_free_space_multiplier: 3

migration:
  command:
    - python
    - -m
    - demo.runtime.migration
    - /srv/dploydb-demo/demo/releases/v2
  timeout_seconds: 30

application:
  runner: docker_compose
  compose_file: /srv/dploydb-demo/demo/compose.yaml
  service: app
  candidate_port: 4511
  candidate_health_url: http://127.0.0.1:4511/health
  startup_timeout_seconds: 30
  test_mode_env:
    DPLOYDB_TEST_MODE: "1"

traffic:
  maintenance_on_command: [/srv/dploydb-demo/ops/maintenance, "on"]
  maintenance_off_command: [/srv/dploydb-demo/ops/maintenance, "off"]
  activate_new_command: [/srv/dploydb-demo/ops/activate, candidate]
  activate_old_command: [/srv/dploydb-demo/ops/activate, current]

backup:
  local_directory: /srv/dploydb-demo/backups
  keep_last: 10
  remote:
    enabled: false
    provider: s3
    bucket: example-backups
    prefix: dploydb/demo
    endpoint_url_env: S3_ENDPOINT_URL
    access_key_env: S3_ACCESS_KEY_ID
    secret_key_env: S3_SECRET_ACCESS_KEY
