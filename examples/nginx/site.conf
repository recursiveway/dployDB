# Include this inside the Nginx `http` block, normally as a site in
# /etc/nginx/sites-enabled/. Replace the server_name and upstream port.
server {
    listen 80;
    server_name app.example.com;

    location / {
        # `return` is a safe use of Nginx `if`. The marker is created before
        # writers stop and removed only after DployDB activates a verified app.
        if (-f /run/dploydb/example-app.maintenance) {
            return 503;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4510;
    }
}
