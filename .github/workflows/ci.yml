name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Safety and package gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.15"
          enable-cache: true
      - name: Sync locked environment
        run: |
          uv lock --check
          uv sync --locked
      - name: Run static validation
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy dploydb
          uv run mypy demo
          uv run mypy scripts/verify_pipx_install.py scripts/verify_clean_linux.py scripts/verify_distribution.py scripts/verify_registry.py scripts/verify_release_tag.py scripts/release_notes.py
      - name: Run complete safety suite
        run: uv run pytest -q
      - name: Build and audit distributions
        run: |
          uv build
          uv run twine check dist/*
          uv run python scripts/verify_distribution.py
          uv run python scripts/verify_pipx_install.py dist/dploydb-*.whl
