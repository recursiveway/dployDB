name: Publish release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing verified release tag to recover
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build once
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Validate release request
        run: |
          test -n "$RELEASE_TAG"
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)((a|b|rc)(0|[1-9][0-9]*))?$ ]]; then
            echo "release tag is not canonical: $RELEASE_TAG" >&2
            exit 1
          fi
          if test "$GITHUB_EVENT_NAME" = "workflow_dispatch"; then
            test "$GITHUB_REF" = "refs/heads/main"
          fi
      - name: Check out signed tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.15"
          enable-cache: true
      - name: Verify tag identity and signature
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          git fetch --force --no-tags origin \
            "refs/heads/main:refs/remotes/origin/main" \
            "refs/tags/${TAG}:refs/tags/${TAG}"
          python scripts/verify_release_tag.py "$TAG"
          object_type=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.type')
          object_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')
          test "$object_type" = "tag"
          remote_target=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" --jq '.object.sha')
          test "$remote_target" = "$(git rev-parse "${TAG}^{}")"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" --jq '.verification.verified')" = "true"
      - name: Sync locked environment
        run: |
          uv lock --check
          uv sync --locked
      - name: Run complete release gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy dploydb
          uv run mypy demo
          uv run mypy scripts/verify_pipx_install.py scripts/verify_clean_linux.py scripts/verify_distribution.py scripts/verify_registry.py scripts/verify_release_tag.py scripts/release_notes.py
          uv run pytest -q
          uv build
          uv run twine check dist/*
          uv run python scripts/verify_distribution.py --tag "${RELEASE_TAG}"
          uv run python scripts/verify_pipx_install.py dist/dploydb-*.whl
          uv run python scripts/verify_clean_linux.py --wheel dist/dploydb-*.whl
      - name: Create checksums
        run: |
          mkdir checksums
          cd dist
          sha256sum dploydb-*.whl dploydb-*.tar.gz > ../checksums/SHA256SUMS
      - name: Attest distributions
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/dploydb-*"
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7
      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksums
          path: checksums/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  draft-github-release:
    name: Create draft GitHub prerelease
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out release documentation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist
      - name: Download checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: checksums
      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          version=${TAG#v}
          python scripts/release_notes.py "$version" --output release-notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --prerelease --title "DployDB ${version} Alpha" --notes-file release-notes.md
            gh release upload "$TAG" dist/* checksums/SHA256SUMS --clobber
          else
            gh release create "$TAG" dist/* checksums/SHA256SUMS --draft --prerelease --verify-tag --title "DployDB ${version} Alpha" --notes-file release-notes.md
          fi

  publish-testpypi:
    name: Publish and verify TestPyPI
    needs: [build, draft-github-release]
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dploydb/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out verification scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist
      - name: Publish exact distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 on 2026-07-19
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
      - name: Verify TestPyPI metadata, hashes, and installation
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          version=${VERSION#v}
          python scripts/verify_registry.py "$version" --base-url https://test.pypi.org --dist dist
          python -m venv /tmp/dploydb-testpypi
          /tmp/dploydb-testpypi/bin/pip install dist/dploydb-*.whl
          /tmp/dploydb-testpypi/bin/pip uninstall --yes dploydb
          /tmp/dploydb-testpypi/bin/pip install --no-deps --index-url https://test.pypi.org/simple/ "dploydb==${version}"
          test "$(/tmp/dploydb-testpypi/bin/dploydb version)" = "dploydb ${version}"

  publish-pypi:
    name: Publish PyPI
    needs: publish-testpypi
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/dploydb/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist
      - name: Publish exact distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 on 2026-07-19
        with:
          packages-dir: dist/

  verify-pypi:
    name: Verify public installation
    needs: publish-pypi
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out verification scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist
      - name: Verify PyPI metadata, hashes, and pipx installation
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          version=${VERSION#v}
          python scripts/verify_registry.py "$version" --dist dist
          python -m pip install "pipx>=1.7.1,<2"
          pipx install "dploydb==${version}"
          test "$(dploydb version)" = "dploydb ${version}"

  finalize-github-release:
    name: Publish GitHub prerelease
    needs: [draft-github-release, verify-pypi]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Publish verified draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_TAG }}
        run: gh release edit "$TAG" --draft=false --prerelease=true
